trigger:
- dev

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  # El ambiente debe ser dev según tus requerimientos guardados
  env: 'dev'

stages:
- stage: BuildAndDeploy
  displayName: 'Build and Deploy Stage'
  jobs:
  - job: Build
    displayName: 'Build and Push'
    # Cambiado de latest a una versión específica
    pool:
      vmImage: 'ubuntu-24.04'
    
    steps:
    # 1. Preparar el entorno de Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x' # Backstage suele requerir v18 o v20
      displayName: 'Install Node.js'

    # 2. Generar dependencias y artefactos (PASO CRUCIAL ANTES DE DOCKER)
    - task: CmdLine@2
      displayName: 'Install dependencies and build Backstage'
      inputs:
        script: |
          corepack enable
          yarn config set nodeLinker node-modules
          yarn install
          
          # Generar los bundles que el Dockerfile va a copiar
          yarn tsc
          yarn build:backend --config ../../app-config.yaml
          
          # Generar el frontend
          yarn workspace app build

    # 3. Construir y empujar la imagen a Azure Container Registry
    - task: Docker@2
      displayName: 'Build and Push Docker Image'
      inputs:
        containerRegistry: 'delfosti-backstage-dev-acr'
        repository: 'backstage'
        command: 'buildAndPush'
        Dockerfile: 'packages/backend/Dockerfile'
        buildContext: '$(System.DefaultWorkingDirectory)'
        tags: |
          $(tag)
          latest

    # 4. Desplegar a la Web App (Al final de todo)
    - task: AzureWebAppContainer@1
      displayName: 'Deploy to Azure Web App'
      inputs:
        azureSubscription: 'platform-dev-rg'
        appName: 'platform-dev-fe'
        containers: 'acrdelfostibackstage.azurecr.io/backstage:$(tag)'
        # Nota: El comando de inicio usualmente ya está definido en el Dockerfile, 
        # pero lo mantenemos si tu arquitectura lo requiere.
        containerCommand: 'node packages/backend --config app-config.production.yaml'